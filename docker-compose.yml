version: "3.8"

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: etl_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: tech_test_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tech_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl_process:
    build: .
    container_name: etl_runner
    volumes:
      - .:/app
    depends_on:
      postgres_db:
        condition: service_healthy
