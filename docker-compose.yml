version: "3.8"

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: etl_postgres
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl_process:
    build: .
    container_name: etl_runner
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      postgres_db:
        condition: service_healthy
    env_file:
      - .env

  api_service:
    build: .
    container_name: missing_number_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
